version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    container_name: doc-generator-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/doc-generator
      MONGODB_DB_NAME: doc-generator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONCURRENCY: 10
      QUEUE_NAME: document-generation
      PDF_TIMEOUT_MS: 5000
      PDF_WORKER_POOL_SIZE: 4
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

  worker:
    build:
      context: .
      target: production
    container_name: doc-generator-worker
    command: node dist/workers/processor.js
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/doc-generator
      MONGODB_DB_NAME: doc-generator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONCURRENCY: 10
      QUEUE_NAME: document-generation
      PDF_TIMEOUT_MS: 5000
      PDF_WORKER_POOL_SIZE: 4
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-network

  mongo:
    image: mongo:7.0
    container_name: doc-generator-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - doc-network

  redis:
    image: redis:7.2-alpine
    container_name: doc-generator-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: doc-generator-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - doc-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: doc-generator-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - doc-network

volumes:
  mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  doc-network:
    driver: bridge
